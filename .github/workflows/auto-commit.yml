name: Strict 15 Daily Commits

on:
  schedule:
    - cron: '0 0 * * *' # Faqat kuniga bir marta (UTC 00:00 da)
  workflow_dispatch: # Faqat o'zingiz tugmani bossangiz ishlaydi

# Bir vaqtning o'zida ikkita skript ishlashini taqiqlash
concurrency:
  group: commit-group
  cancel-in-progress: true

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Run 15 Strict Commits
        run: |
          git config --local user.email "kamolbekrozmamatov@gmail.com"
          git config --local user.name "ruzmamatov99"
          
          # Aniq 15 marta takrorlanadi
          for i in {1..15}
          do
            echo "Security Update $i - $(date)" > last_activity.txt
            git add last_activity.txt
            git commit -m "Daily fix $i/15"
          done

      - name: Push Changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
