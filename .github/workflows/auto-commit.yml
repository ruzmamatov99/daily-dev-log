name: Fixed 15 Commits Daily

on:
  schedule:
    - cron: '0 0 * * *' # Har kuni O'zbekiston vaqti bilan tonggi 05:00 da
  workflow_dispatch:      # Xohlagan vaqtda "Run workflow" tugmasi orqali ishlatish uchun

# Bir vaqtda bir nechta skript ishlashini taqiqlaydi
concurrency:
  group: daily-commit-group
  cancel-in-progress: true

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Exactly 15 Commits
        run: |
          git config --local user.email "kamolbekrozmamatov@gmail.com"
          git config --local user.name "ruzmamatov99"
          
          # Aniq 15 marta takrorlanadi
          for i in {1..15}
          do
            echo "Maintenance log: $(date) - index $i" > daily_report.txt
            git add daily_report.txt
            git commit -m "Daily Activity #$i/15"
          done

      - name: Push Changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
