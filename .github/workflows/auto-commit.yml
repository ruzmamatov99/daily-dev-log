name: Ultimate 15 Commit Fix

on:
  schedule:
    - cron: '30 23 * * *' # Har kuni O'zbekiston vaqti bilan 04:30 da (Tirbandlik kam vaqtda)
  workflow_dispatch: 

# Bu qism eng muhimi: bir vaqtda faqat bitta skript ishlashiga ruxsat beradi
concurrency:
  group: "fixed-15"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Agar 5 daqiqadan ko'p ishlasa, GitHub o'zi o'chirib yuboradi (Limit)
    timeout-minutes: 5 
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Hard Reset and 15 Commits
        run: |
          git config --local user.email "kamolbekrozmamatov@gmail.com"
          git config --local user.name "ruzmamatov99"
          
          # Har doim 15 marta ishlashi uchun qat'iy sikl
          for i in {1..15}
          do
            echo "Maintenance log: $(date)" > maintenance.txt
            git add maintenance.txt
            git commit -m "System check $i/15"
          done
          
      - name: Push safely
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
