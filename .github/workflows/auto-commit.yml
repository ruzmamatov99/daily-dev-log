name: Fixed 15 Daily Commits

on:
  schedule:
    - cron: '0 0 * * *' # Har kuni O'zbekiston vaqti bilan tonggi 05:00 da (UTC 00:00)
  workflow_dispatch: # Xohlagan vaqtda qo'lda ishga tushirish uchun

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Generate 15 Commits
        run: |
          git config --local user.email "kamolbekrozmamatov@gmail.com"
          git config --local user.name "ruzmamatov99"
          
          # Aniq 15 marta takrorlanadigan sikl
          for i in {1..15}
          do
            echo "Daily Update $i - $(date)" > daily_log.txt
            git add daily_log.txt
            git commit -m "Commit #$i: Daily activity maintenance"
          done

      - name: Push Changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
