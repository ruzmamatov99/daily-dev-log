name: Daily 15 Commits Fix

on:
  schedule:
    - cron: '0 0 * * *' # Har kuni O'zbekiston vaqti bilan tonggi 05:00 da
  workflow_dispatch:      # Xohlagan vaqtda qo'lda ishga tushirish uchun

permissions:
  contents: write

concurrency:
  group: daily-15-lock
  cancel-in-progress: true

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Exactly 15 Commits
        run: |
          git config --local user.email "kamolbekrozmamatov@gmail.com"
          git config --local user.name "ruzmamatov99"
          
          for i in {1..15}
          do
            echo "Daily log: $(date) - commit $i" > daily_activity.txt
            git add daily_activity.txt
            git commit -m "Auto-maintenance $i/15"
          done
          
          git push origin main
